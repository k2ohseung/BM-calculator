<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>조류 계산기</title>

<style>

body{
    background:#222;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#333;
    padding:30px;
    border-radius:15px;
    width:300px;
}

select,
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    font-size:16px;
}

.result{
    margin-top:20px;
    font-size:30px;
    text-align:center;
}

</style>
</head>

<body>

<div class="box">

<h2>조류 계산기</h2>

<select id="weapon">
    <option value="39">U-boat</option>
    <option value="37">Zeus</option>
    <option value="23">MC-fish</option>
</select>

<select id="current">
    <option value="0">0%</option>
    <option value="1">6%</option>
    <option value="2">13%</option>
    <option value="3">19%</option>
    <option value="4">25%</option>
    <option value="5">31%</option>
    <option value="6">38%</option>
    <option value="7">44%</option>
    <option value="8">50%</option>
    <option value="9">56%</option>
    <option value="10">63%</option>
    <option value="11">69%</option>
    <option value="12">75%</option>
    <option value="13">81%</option>
    <option value="14">88%</option>
    <option value="15">94%</option>
    <option value="16">100%</option>
</select>

<button onclick="calc(1)">순졸</button>
<button onclick="calc(-1)">역졸</button>

<div class="result" id="result">
0
</div>

</div>

<script>

function calc(direction){

    let M = Number(document.getElementById("weapon").value);

    let n = Number(document.getElementById("current").value);

    let X = 16;

    let Y;

    if(direction == 1){
        Y = M + (M * n / X);
    }else{
        Y = M - (M * n / X);
    }

    document.getElementById("result").innerText =
        Y.toFixed(1);

}

</script>

</body>
</html>
