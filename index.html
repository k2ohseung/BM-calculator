
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배틀마린 계산기</title>

<style>

body{
    margin:0;
    background:#1b1b1b;
    color:white;
    font-family:sans-serif;
}

header{
    background:#111;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.tabs{
    display:flex;
}

.tab{
    flex:1;
    padding:15px;
    text-align:center;
    background:#2a2a2a;
    cursor:pointer;
    border:none;
    color:white;
    font-size:18px;
}

.tab.active{
    background:#444;
}

.content{
    display:none;
    padding:20px;
}

.content.active{
    display:block;
}

.box{
    background:#2a2a2a;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}

select,
input,
button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    background:#0080ff;
    color:white;
    cursor:pointer;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}

.table-wrap{
    overflow-x:auto;
    margin-top:20px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,
td{
    border:1px solid #666;
    padding:10px;
    text-align:center;
}

th{
    background:#333;
}

</style>
</head>
<body>

<header>
배틀마린 계산기
</header>

<div class="tabs">
    <button class="tab active" onclick="showTab(0)">거리별</button>
    <button class="tab" onclick="showTab(1)">풀샷</button>
</div>

<!-- 거리별 탭 -->
<div class="content active">

<div class="box">

<h2>거리별 계산</h2>
<p>잠수함 선택 후 기준 거리를 입력하고 순졸 / 역졸 계산 가능</p>

<select id="distanceWeapon">
    <option value="23">맥피시</option>
    <option value="30">보틀</option>
    <option value="35">블라스트</option>
    <option value="33">씨울프</option>
    <option value="32">아쿨라</option>
    <option value="31">아이언</option>
    <option value="29">워터스프릿</option>
    <option value="39">유봇</option>
    <option value="28">장보고</option>
    <option value="37">제우스</option>
    <option value="36">타이푼</option>
</select>

<input type="number" id="baseDistance" placeholder="기준 거리 입력">

<select id="distanceCurrent">
    <option value="1">0%</option>
    <option value="0.94">6%</option>
    <option value="0.88">13%</option>
    <option value="0.81">19%</option>
    <option value="0.75">25%</option>
    <option value="0.69">31%</option>
    <option value="0.63">38%</option>
    <option value="0.56">44%</option>
    <option value="0.5">50%</option>
    <option value="0.44">56%</option>
    <option value="0.38">63%</option>
    <option value="0.31">69%</option>
    <option value="0.25">75%</option>
    <option value="0.19">81%</option>
    <option value="0.13">88%</option>
    <option value="0.06">94%</option>
    <option value="0">100%</option>
</select>

<button onclick="calcDistance('plus')">순졸 계산</button>
<button onclick="calcDistance('minus')">역졸 계산</button>

<div class="result" id="distanceResult">
0
</div>

</div>

</div>

<!-- 풀샷 탭 -->
<div class="content">

<div class="box">

<h2>풀샷 계산</h2>
<p>잠수함별 풀샷 거리 자동 계산</p>

<select id="fullWeapon">
    <option value="23">맥피시</option>
    <option value="30">보틀</option>
    <option value="35">블라스트</option>
    <option value="33">씨울프</option>
    <option value="32">아쿨라</option>
    <option value="31">아이언</option>
    <option value="29">워터스프릿</option>
    <option value="39">유봇</option>
    <option value="28">장보고</option>
    <option value="37">제우스</option>
    <option value="36">타이푼</option>
</select>

<select id="fullCurrent">
    <option value="0">0%</option>
    <option value="1">6%</option>
    <option value="2">13%</option>
    <option value="3">19%</option>
    <option value="4">25%</option>
    <option value="5">31%</option>
    <option value="6">38%</option>
    <option value="7">44%</option>
    <option value="8">50%</option>
    <option value="9">56%</option>
    <option value="10">63%</option>
    <option value="11">69%</option>
    <option value="12">75%</option>
    <option value="13">81%</option>
    <option value="14">88%</option>
    <option value="15">94%</option>
    <option value="16">100%</option>
</select>

<button onclick="calcFull('plus')">순졸 계산</button>
<button onclick="calcFull('minus')">역졸 계산</button>

<div class="result" id="fullResult">
0
</div>



</div>

</div>

<script>

function showTab(index){

    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.content');

    tabs.forEach(tab => tab.classList.remove('active'));
    contents.forEach(content => content.classList.remove('active'));

    tabs[index].classList.add('active');
    contents[index].classList.add('active');
}

function calcFull(type){

    let M = Number(document.getElementById('fullWeapon').value);
    let n = Number(document.getElementById('fullCurrent').value);

    let result;

    // 순조류
    if(type === 'plus'){
        result = M + (M * (n / 16));
    }

    // 역조류
    else{
        result = M - (M * (n / 16));
    }

    document.getElementById('fullResult').innerText =
        result.toFixed(1);
}

function calcDistance(type){

    let weapon = document.getElementById('distanceWeapon').value;
    let base = Number(document.getElementById('baseDistance').value);
    let current = Number(document.getElementById('distanceCurrent').value);

    if(base <= 0){
        alert('기준 거리를 입력하세요');
        return;
    }

    // 군 분류
    let group;

    if(weapon === '39' || weapon === '23'){
        group = 36; // A군
    }else if(weapon === '37' || weapon === '32' || weapon === '33'){
        group = 32; // B군
    }else if(weapon === '29' || weapon === '31' || weapon === '35'){
        group = 28; // C군
    }else{
        group = 24; // D군
    }

    let result;

    // 실제 엑셀 기준 계산
    if(type === 'plus'){
        result = (base * group) / (group + (16 * current));
    }else{
        result = (base * group) / (group - (16 * current));
    }

    document.getElementById('distanceResult').innerText = result.toFixed(1);
}

</script>

</body>
</html>
