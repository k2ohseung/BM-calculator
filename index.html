<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>잠수함 풀거리 계산표</title>

<style>
    body{
        font-family: 'Malgun Gothic', sans-serif;
        background:#111827;
        color:white;
        padding:30px;
    }

    h1{
        text-align:center;
        margin-bottom:30px;
    }

    .group-title{
        margin-top:40px;
        margin-bottom:10px;
        font-size:24px;
        font-weight:bold;
        color:#60a5fa;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-bottom:30px;
        background:#1f2937;
    }

    th, td{
        border:1px solid #374151;
        padding:10px;
        text-align:center;
    }

    th{
        background:#2563eb;
        color:white;
    }

    tr:nth-child(even){
        background:#273549;
    }

    .submarine-name{
        font-weight:bold;
        color:#facc15;
    }
</style>
</head>

<body>

<h1>잠수함 풀거리 계산표</h1>

<!-- A군 -->
<div class="group-title">A군</div>

<table>
    <thead>
        <tr>
            <th>잠수함</th>
            <th>6%</th>
            <th>13%</th>
            <th>25%</th>
            <th>50%</th>
            <th>75%</th>
            <th>100%</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td class="submarine-name">유봇</td>
            <td>12.1</td>
            <td>18.3</td>
            <td>25.5</td>
            <td>
                순조류 47.7<br>
                역조류 30.3
            </td>
            <td>66.4</td>
            <td>80.2</td>
        </tr>

        <tr>
            <td class="submarine-name">가토</td>
            <td>11.8</td>
            <td>17.6</td>
            <td>24.8</td>
            <td>
                순조류 45.2<br>
                역조류 29.1
            </td>
            <td>63.5</td>
            <td>77.0</td>
        </tr>
    </tbody>
</table>

<!-- B군 -->
<div class="group-title">B군</div>

<table>
    <thead>
        <tr>
            <th>잠수함</th>
            <th>6%</th>
            <th>13%</th>
            <th>25%</th>
            <th>50%</th>
            <th>75%</th>
            <th>100%</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td class="submarine-name">세이렌</td>
            <td>10.2</td>
            <td>15.5</td>
            <td>22.1</td>
            <td>
                순조류 40.0<br>
                역조류 26.7
            </td>
            <td>59.2</td>
            <td>71.9</td>
        </tr>
    </tbody>
</table>

</body>
</html>
