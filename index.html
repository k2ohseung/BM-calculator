<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>조류계산기</title>

<style>

body{
    margin:0;
    padding:15px;
    background:#0f172a;
    color:white;
    font-family:'Malgun Gothic',sans-serif;
}

.container{
    max-width:600px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:18px;
}

h1{
    text-align:center;
    margin-top:0;
    margin-bottom:20px;
    font-size:28px;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    font-size:15px;
    cursor:pointer;
}

.tab-btn.active{
    background:#0ea5e9;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

.select-box{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:15px;
}

select,
input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    font-size:15px;
    box-sizing:border-box;
}

.result{
    margin-top:20px;
    background:#111827;
    padding:18px;
    border-radius:15px;
}

.result-title{
    color:#38bdf8;
    font-size:18px;
    margin-bottom:5px;
}

.result-value{
    font-size:28px;
    color:#facc15;
    font-weight:bold;
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container">

    <h1>조류계산기</h1>

    <!-- 탭 -->
    <div class="tabs">

        <button
            class="tab-btn active"
            onclick="showTab(1)"
            id="tabBtn1"
        >
            조류계산
        </button>

        <button
            class="tab-btn"
            onclick="showTab(2)"
            id="tabBtn2"
        >
            풀거리계산
        </button>

    </div>

    <!-- ========================= -->
    <!-- 조류 계산기 -->
    <!-- ========================= -->

    <div
        class="tab-content active"
        id="tab1"
    >

        <!-- 캐릭터 -->
        <div class="select-box">

            <label>캐릭터</label>

            <select id="submarine1">

                <option value="레이건">레이건</option>
                <option value="맥피시">맥피시</option>
                <option value="보틀">보틀</option>
                <option value="블라스트">블라스트</option>
                <option value="씨울프">씨울프</option>
                <option value="아쿨라">아쿨라</option>
                <option value="아이언">아이언</option>
                <option value="워터스피릿">워터스피릿</option>
                <option value="유봇">유봇</option>
                <option value="장보고">장보고</option>
                <option value="제우스">제우스</option>
                <option value="타이푼">타이푼</option>

            </select>

        </div>

        <!-- 거리 -->
        <div class="select-box">

            <label>거리</label>

            <select id="distance1">

                <option value="37.5">37.5</option>
                <option value="34.5">34.5</option>
                <option value="30.5">30.5</option>
                <option value="28.5">28.5</option>
                <option value="26.5">26.5</option>
                <option value="23.5">23.5</option>
                <option value="20.5">20.5</option>
                <option value="17.5">17.5</option>
                <option value="15">15</option>
                <option value="13">13</option>
                <option value="10">10</option>
                <option value="8">8</option>
                <option value="6">6</option>

            </select>

        </div>

        <!-- 조류 -->
        <div class="select-box">

            <label>조류 (%)</label>

            <input
                type="number"
                id="currentPercent1"
                value="0"
            >

        </div>

        <!-- 결과 -->
        <div class="result">

            <div class="result-title">순조류</div>
            <div class="result-value" id="forwardValue1">0.0</div>

            <div class="result-title">역조류</div>
            <div class="result-value" id="reverseValue1">0.0</div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- 풀거리 계산기 -->
    <!-- ========================= -->

    <div
        class="tab-content"
        id="tab2"
    >

        <!-- 캐릭터 -->
        <div class="select-box">

            <label>캐릭터</label>

            <select id="submarine2">

                <option value="레이건">레이건</option>
                <option value="맥피시">맥피시</option>
                <option value="보틀">보틀</option>
                <option value="블라스트">블라스트</option>
                <option value="씨울프">씨울프</option>
                <option value="아쿨라">아쿨라</option>
                <option value="아이언">아이언</option>
                <option value="워터스피릿">워터스피릿</option>
                <option value="유봇">유봇</option>
                <option value="장보고">장보고</option>
                <option value="제우스">제우스</option>
                <option value="타이푼">타이푼</option>

            </select>

        </div>

        <!-- 조류 -->
        <div class="select-box">

            <label>조류 (%)</label>

            <input
                type="number"
                id="currentPercent2"
                value="0"
            >

        </div>

        <!-- 결과 -->
        <div class="result">

            <div class="result-title">순조류</div>
            <div class="result-value" id="forwardValue2">0.0</div>

            <div class="result-title">역조류</div>
            <div class="result-value" id="reverseValue2">0.0</div>

        </div>

    </div>

</div>

<script>

/*
====================================
잠수함 데이터
====================================
*/

const submarineData = {

    "유봇":{
        base:36,
        max:39
    },

    "제우스":{
        base:36,
        max:37
    },

    "맥피시":{
        base:36,
        max:23
    },

    "레이건":{
        base:32,
        max:29
    },

    "블라스트":{
        base:32,
        max:27
    },

    "씨울프":{
        base:32,
        max:35
    },

    "아쿨라":{
        base:32,
        max:41
    },

    "타이푼":{
        base:32,
        max:25
    },

    "보틀":{
        base:28,
        max:21
    },

    "아이언":{
        base:28,
        max:19
    },

    "워터스피릿":{
        base:28,
        max:33
    },

    "장보고":{
        base:24,
        max:31
    }

};

/*
====================================
조류 단계표
====================================
*/

const currentTable = [
    6,13,19,25,
    31,38,44,50,
    56,63,69,75,
    81,88,94,100
];

/*
====================================
탭 변경
====================================
*/

function showTab(tabNumber){

    document
        .querySelectorAll(".tab-content")
        .forEach(tab=>{
            tab.classList.remove("active");
        });

    document
        .querySelectorAll(".tab-btn")
        .forEach(btn=>{
            btn.classList.remove("active");
        });

    document
        .getElementById("tab"+tabNumber)
        .classList.add("active");

    document
        .getElementById("tabBtn"+tabNumber)
        .classList.add("active");

}

/*
====================================
n값 계산
====================================
*/

function getN(percent){

    /*
    0%면 기본값
    */

    if(percent <= 0){

        return 0;

    }

    let n = 1;

    let closestDiff = Infinity;

    currentTable.forEach((value,index)=>{

        const diff =
            Math.abs(percent - value);

        if(diff < closestDiff){

            closestDiff = diff;

            n = index + 1;

        }

    });

    return n;

}

/*
====================================
조류 계산기
====================================
*/

function calculateCurrent(){

    const submarine =
        document.getElementById("submarine1").value;

    const distance =
        Number(
            document.getElementById("distance1").value
        );

    const percent =
        Number(
            document.getElementById("currentPercent1").value
        );

    const n =
        getN(percent);

    const base =
        submarineData[submarine].base;

    const max =
        submarineData[submarine].max;

    /*
    순조류
    */

    const forward =
        distance * base / (base + n);

    /*
    역조류
    */

    const reverse =
        distance * base / (base - n);

    document.getElementById(
        "forwardValue1"
    ).textContent =
        forward.toFixed(1);

    /*
    최대거리 초과시 숨김
    */

    if(reverse > max){

        document.getElementById(
            "reverseValue1"
        ).textContent = "-";

    }else{

        document.getElementById(
            "reverseValue1"
        ).textContent =
            reverse.toFixed(1);

    }

}

/*
====================================
풀거리 계산기
====================================
*/

function calculateFull(){

    const submarine =
        document.getElementById("submarine2").value;

    const percent =
        Number(
            document.getElementById("currentPercent2").value
        );

    const n =
        getN(percent);

    const base =
        submarineData[submarine].base;

    const max =
        submarineData[submarine].max;

    /*
    순조류
    Y = M + M*n/X
    */

    const forward =
        max + (max * n / base);

    /*
    역조류
    Y = M - M*n/X
    */

    const reverse =
        max - (max * n / base);

    document.getElementById(
        "forwardValue2"
    ).textContent =
        forward.toFixed(1);

    document.getElementById(
        "reverseValue2"
    ).textContent =
        reverse.toFixed(1);

}

/*
====================================
이벤트
====================================
*/

document.getElementById(
    "submarine1"
).addEventListener(
    "change",
    calculateCurrent
);

document.getElementById(
    "distance1"
).addEventListener(
    "change",
    calculateCurrent
);

document.getElementById(
    "currentPercent1"
).addEventListener(
    "input",
    calculateCurrent
);

document.getElementById(
    "submarine2"
).addEventListener(
    "change",
    calculateFull
);

document.getElementById(
    "currentPercent2"
).addEventListener(
    "input",
    calculateFull
);

/*
====================================
초기 실행
====================================
*/

calculateCurrent();
calculateFull();

</script>

</body>
</html>
