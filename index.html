<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>잠수함 거리 계산기</title>

<style>
    body{
        font-family:'Malgun Gothic',sans-serif;
        background:#0f172a;
        color:white;
        margin:0;
        padding:40px;
    }

    .container{
        max-width:700px;
        margin:auto;
        background:#1e293b;
        padding:30px;
        border-radius:15px;
    }

    h1{
        text-align:center;
        margin-bottom:30px;
    }

    .box{
        margin-bottom:20px;
    }

    label{
        display:block;
        margin-bottom:8px;
        font-size:18px;
    }

    select{
        width:100%;
        padding:12px;
        font-size:16px;
        border:none;
        border-radius:8px;
        background:#334155;
        color:white;
    }

    .result{
        margin-top:30px;
        background:#111827;
        padding:25px;
        border-radius:10px;
        font-size:22px;
        line-height:1.8;
    }

    .current{
        color:#38bdf8;
        font-weight:bold;
    }

    .value{
        color:#facc15;
        font-weight:bold;
    }
</style>
</head>

<body>

<div class="container">

    <h1>잠수함 거리 계산기</h1>

    <!-- 잠수함 선택 -->
    <div class="box">
        <label>잠수함 선택</label>

        <select id="submarine">
            <!-- 가나다순 -->
            <option value="맥피시">맥피시</option>
            <option value="유봇">유봇</option>
            <option value="제우스">제우스</option>
        </select>
    </div>

    <!-- 바람 선택 -->
    <div class="box">
        <label>바람 퍼센트 선택</label>

        <select id="wind">
            <option value="6">6%</option>
            <option value="13">13%</option>
            <option value="19">19%</option>
            <option value="25">25%</option>
            <option value="31">31%</option>
            <option value="38">38%</option>
            <option value="44">44%</option>
            <option value="50">50%</option>
            <option value="56">56%</option>
            <option value="63">63%</option>
            <option value="69">69%</option>
            <option value="75">75%</option>
            <option value="81">81%</option>
            <option value="88">88%</option>
            <option value="94">94%</option>
            <option value="100">100%</option>
        </select>
    </div>

    <!-- 결과 -->
    <div class="result">

        <div>
            <span class="current">순조류</span> :
            <span class="value" id="forward">40.1</span>
        </div>

        <div>
            <span class="current">역조류</span> :
            <span class="value" id="reverse">37.9</span>
        </div>

    </div>

</div>

<script>

const data = {

    "유봇":{

        "6":{
            forward:"40.1",
            reverse:"37.9"
        },

        "50":{
            forward:"47.7",
            reverse:"30.3"
        }

    },

    "제우스":{

        "6":{
            forward:"41.0",
            reverse:"38.5"
        },

        "50":{
            forward:"48.2",
            reverse:"31.0"
        }

    },

    "맥피시":{

        "6":{
            forward:"39.2",
            reverse:"36.8"
        },

        "50":{
            forward:"46.9",
            reverse:"29.7"
        }

    }

};

const submarine = document.getElementById("submarine");
const wind = document.getElementById("wind");

const forward = document.getElementById("forward");
const reverse = document.getElementById("reverse");

function updateResult(){

    const sub = submarine.value;
    const windValue = wind.value;

    const result = data[sub][windValue];

    if(result){

        forward.innerText = result.forward;
        reverse.innerText = result.reverse;

    }else{

        forward.innerText = "-";
        reverse.innerText = "-";

    }

}

submarine.addEventListener("change",updateResult);
wind.addEventListener("change",updateResult);

updateResult();

</script>

</body>
</html>
